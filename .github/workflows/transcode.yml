name: Video Transcoder
on:
  repository_dispatch:
    types: [process-video]

jobs:
  transcode:
    runs-on: ubuntu-latest
    steps:
      - name: Setup FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Prepare Workspace
        run: |
          mkdir -p workspace/hls/v0 workspace/hls/v1 workspace/hls/v2 workspace/hls/v3

      - name: Download Raw Video
        run: |
          curl -L "${{ github.event.client_payload.inputUrl }}" -o workspace/input.mp4

      - name: Transcode to Multi-Res HLS
        working-directory: ./workspace
        run: |
          ffmpeg -i input.mp4 \
            -filter_complex \
            "[0:v]split=4[v1][v2][v3][v4]; \
             [v1]scale=1920:1080[v1out]; \
             [v2]scale=1280:720[v2out]; \
             [v3]scale=854:480[v3out]; \
             [v4]scale=640:360[v4out]; \
             [0:a]asplit=4[a1][a2][a3][a4]" \
            -map "[v1out]" -map "[a1]" -c:v:0 libx264 -preset superfast -b:v:0 5000k -c:a:0 aac -b:a:0 128k \
            -map "[v2out]" -map "[a2]" -c:v:1 libx264 -preset superfast -b:v:1 2800k -c:a:1 aac -b:a:1 128k \
            -map "[v3out]" -map "[a3]" -c:v:2 libx264 -preset superfast -b:v:2 1400k -c:a:2 aac -b:a:2 128k \
            -map "[v4out]" -map "[a4]" -c:v:3 libx264 -preset superfast -b:v:3 800k -c:a:3 aac -b:a:3 128k \
            -f hls \
            -hls_time 6 \
            -hls_playlist_type vod \
            -hls_segment_filename "hls/v%v/segment%03d.ts" \
            -master_pl_name master.m3u8 \
            -var_stream_map "v:0,a:0 v:1,a:1 v:2,a:2 v:3,a:3" \
            hls/v%v/index.m3u8

      - name: Sync to Cloudflare R2
        working-directory: ./workspace/hls
        run: |
          aws s3 sync . s3://youtube/processed/${{ github.event.client_payload.videoId }}/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflAREstorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Update Database Directly
        run: |
          # We construct the URL and run the update query directly against Postgres
          # Replace 'YOUR_PUBLIC_R2_URL' with your actual R2 public domain
          PUBLIC_URL="https://pub-69011fd091b04e43be7212bbe23d52e3.r2.dev/processed/${{ github.event.client_payload.videoId }}/master.m3u8"
          
          psql "${{ secrets.DATABASE_URL }}" -c "UPDATE uploads SET status = 'READY', hls_url = '$PUBLIC_URL' WHERE id = '${{ github.event.client_payload.videoId }}';"