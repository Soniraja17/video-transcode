name: Video Transcoder
on:
  repository_dispatch:
    types: [process-video]

jobs:
  transcode:
    runs-on: ubuntu-latest
    steps:
      - name: Setup FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Download Raw Video
        run: |
          curl -L "${{ github.event.client_payload.inputUrl }}" -o input.mp4

      - name: Transcode to Multi-Res HLS
        run: |
          # Create the folder structure
          mkdir -p output/v{0,1,2,3}
          
          # Professional command for 1080p, 720p, 480p, 360p
          ffmpeg -i input.mp4 \
            -filter_complex "[0:v]split=4[v1][v2][v3][v4]; \
            [v1]scale=w=1920:h=1080[v1out]; \
            [v2]scale=w=1280:h=720[v2out]; \
            [v3]scale=w=854:h=480[v3out]; \
            [v4]scale=w=640:h=360[v4out]" \
            -map "[v1out]" -c:v:0 libx264 -b:v:0 5000k -g 48 -keyint_min 48 -sc_threshold 0 \
            -map "[v2out]" -c:v:1 libx264 -b:v:1 2800k -g 48 -keyint_min 48 -sc_threshold 0 \
            -map "[v3out]" -c:v:2 libx264 -b:v:2 1400k -g 48 -keyint_min 48 -sc_threshold 0 \
            -map "[v4out]" -c:v:3 libx264 -b:v:3 800k -g 48 -keyint_min 48 -sc_threshold 0 \
            -map a:0 -c:a aac -b:a 128k -ac 2 \
            -f hls \
            -hls_time 10 \
            -hls_playlist_type vod \
            -hls_segment_filename "output/v%v/file%03d.ts" \
            -master_pl_name master.m3u8 \
            -var_stream_map "v:0,a:0 v:1,a:0 v:2,a:0 v:3,a:0" \
            output/v%v/index.m3u8

      - name: Sync to Cloudflare R2
        run: |
          aws s3 sync output/ s3://youtube/processed/${{ github.event.client_payload.videoId }}/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Notify Backend
        run: |
          curl -X POST "${{ secrets.BACKEND_API_URL }}/api/webhooks/video-ready" \
            -H "Content-Type: application/json" \
            -d '{"videoId": "${{ github.event.client_payload.videoId }}", "status": "READY"}'